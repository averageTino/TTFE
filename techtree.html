<script>
function getFlagEmoji(countryCode) {
    if (!countryCode || countryCode.length !== 2) {
        return "";
    }
    const codePoints = countryCode
        .toUpperCase()
        .split('')
        .map(char => 127397 + char.charCodeAt());
    return String.fromCodePoint(...codePoints);
}

function getFactionFlagSrc(flagValue) {
    if (!flagValue) return "";
    const raw = String(flagValue).trim();
    if (!raw) return "";
    if (raw.startsWith('custom:')) return raw.slice('custom:'.length);
    if (raw.startsWith('data:image/')) return raw;
    const lowered = raw.toLowerCase();
    if (/\.(svg|png|jpe?g|webp|gif)$/i.test(raw)) return `content/${raw}`;
    if (lowered.length === 2) return `content/${lowered}.svg`;
    return "";
}

function setFactionTitle() {
    const titleElem = document.getElementById("factionTitle");
    if (!titleElem || !faction) return;

    titleElem.innerHTML = "";
    const flagSrc = getFactionFlagSrc(faction.flag);
    if (flagSrc) {
        const flagImg = document.createElement('img');
        flagImg.src = flagSrc;
        flagImg.alt = faction.flag || "flag";
        flagImg.className = 'title-flag-icon';
        flagImg.onerror = () => {
            flagImg.remove();
            if (faction.flag && String(faction.flag).length === 2) {
                titleElem.prepend(document.createTextNode(getFlagEmoji(faction.flag) + " "));
            }
        };
        titleElem.appendChild(flagImg);
    } else if (faction.flag && String(faction.flag).length === 2) {
        const flagText = document.createTextNode(getFlagEmoji(faction.flag) + " ");
        titleElem.appendChild(flagText);
    }

    titleElem.appendChild(document.createTextNode(faction.name + " Tech Tree"));
}

function normalizeVehicleFlagValue(flagValue) {
    if (!flagValue) return "";
    const raw = String(flagValue);
    if (raw.startsWith(CUSTOM_FLAG_PREFIX)) return raw;
    if (raw.startsWith("data:image/")) return `${CUSTOM_FLAG_PREFIX}${raw}`;
    if (flagSvgSet.has(raw)) return raw;
    const asCode = `${raw.toLowerCase()}.svg`;
    if (flagSvgSet.has(asCode)) return asCode;
    return "";
}

function applyViewMode() {
    const normalized = viewMode === "barebones" ? "barebones" : "traditional";
    viewMode = normalized;

    document.body.classList.toggle("barebones-mode", viewMode === "barebones");

    const traditionalBtn = document.getElementById("modeTraditionalBtn");
    const barebonesBtn = document.getElementById("modeBarebonesBtn");
    if (traditionalBtn) traditionalBtn.classList.toggle("active", viewMode === "traditional");
    if (barebonesBtn) barebonesBtn.classList.toggle("active", viewMode === "barebones");
}

function setViewMode(nextMode) {
    viewMode = nextMode === "barebones" ? "barebones" : "traditional";
    try {
        localStorage.setItem("tt-view-mode", viewMode);
    } catch {
    }
    applyViewMode();
    if (faction) renderTechTree();
}

function loadViewMode() {
    let stored = "traditional";
    try {
        stored = localStorage.getItem("tt-view-mode") || "traditional";
    } catch {
    }
    viewMode = stored === "barebones" ? "barebones" : "traditional";
    applyViewMode();
}
function getVehicleFlagSrc(flagValue) {
    const normalized = normalizeVehicleFlagValue(flagValue);
    if (!normalized) return "";
    if (normalized.startsWith(CUSTOM_FLAG_PREFIX)) {
        return normalized.slice(CUSTOM_FLAG_PREFIX.length);
    }
    return `content/${normalized}`;
}

function updateVehicleFlagControls() {
    const foreignToggle = document.getElementById("vehicleForeignToggle");
    const flagBtn = document.getElementById("vehicleFlagSelect");
    const preview = document.getElementById("vehicleFlagPreview");
    if (!foreignToggle || !flagBtn || !preview) return;

    modalForeignVehicle = !!foreignToggle.checked;
    flagBtn.disabled = !modalForeignVehicle;

    if (!modalForeignVehicle) {
        preview.classList.add("hidden");
        return;
    }

    if (modalForeignFlag) {
        preview.src = getVehicleFlagSrc(modalForeignFlag);
        preview.classList.remove("hidden");
    } else {
        preview.classList.add("hidden");
    }
}

function renderVehicleIconPicker() {
    const grid = document.getElementById("vehicleIconPickerGrid");
    if (!grid) return;
    grid.innerHTML = "";

    flagSvgFiles.forEach(fileName => {
        const option = document.createElement("button");
        option.type = "button";
        option.className = "index-icon-option" + (modalForeignFlag === fileName ? " selected" : "");

        const img = document.createElement("img");
        img.className = "index-option-flag-icon";
        img.src = getVehicleFlagSrc(fileName);
        img.alt = fileName;
        option.appendChild(img);

        option.onclick = () => {
            modalForeignFlag = normalizeVehicleFlagValue(fileName);
            updateVehicleFlagControls();
            renderVehicleIconPicker();
            closeVehicleIconPicker();
        };
        grid.appendChild(option);
    });
}

function openVehicleIconPicker() {
    renderVehicleIconPicker();
    const modal = document.getElementById("vehicleIconPickerModal");
    if (modal) modal.classList.remove("hidden");
}

function closeVehicleIconPicker() {
    const modal = document.getElementById("vehicleIconPickerModal");
    if (modal) modal.classList.add("hidden");
}

// helper to convert number to roman numeral (1-12)
function toRoman(num) {
    const roman = ["","I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"];
    return roman[num] || num;
}

// convert hex color (#rrggbb) to {r,g,b}
function hexToRgb(hex) {
    if (hex.startsWith('#')) hex = hex.slice(1);
    if (hex.length === 3) {
        hex = hex.split('').map(c => c + c).join('');
    }
    const num = parseInt(hex, 16);
    return {
        r: (num >> 16) & 255,
        g: (num >> 8) & 255,
        b: num & 255
    };
}

// return fading gradient string from a base hex color
function gradientFromColor(hex) {
    const {r,g,b} = hexToRgb(hex);
    return `linear-gradient(to right, rgba(${r},${g},${b},0.30), rgba(${r},${g},${b},0.15), rgba(${r},${g},${b},0.05), rgba(${r},${g},${b},0))`;
}

function getRoleBorderColor(roleObj, roleName) {
    const configured = String(roleObj?.color || '').trim().toLowerCase();
    if (configured && configured !== '#fff' && configured !== '#ffffff') {
        return roleObj.color;
    }
    const fallbackByRole = {
        'Heavy Tank': '#7b3f00',
        'Medium Tank': '#4b6fa5',
        'Light Tank': '#3d7a3d',
        'MBT': '#783ca0',
        'Tank Destroyer': '#a02828',
        'SPAA': '#c8aa28'
    };
    return fallbackByRole[roleName] || '#ffffff';
}

// helper to resize data URLs; quality parameter allows aggressive reduction
function resizeDataUrl(dataUrl, maxDim, callback, quality = 0.7) {
    const img = new Image();
    img.onload = () => {
        let { width, height } = img;
        if (width <= maxDim && height <= maxDim && quality >= 0.7) {
            callback(dataUrl);
            return;
        }
        const scale = Math.min(maxDim / width, maxDim / height);
        width = Math.round(width * scale);
        height = Math.round(height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        const resized = canvas.toDataURL('image/jpeg', quality);
        callback(resized);
    };
    img.onerror = () => {
        callback(dataUrl);
    };
    img.src = dataUrl;
}

// aggressively compress an array of dataURLs when storage quota is hit
function reduceImagesForQuota(images) {
    return new Promise(resolve => {
        const results = [];
        let remaining = images.length;
        if (remaining === 0) {
            resolve(results);
            return;
        }
        images.forEach((data, idx) => {
            // first scale to 400px then 200px with lower quality
            resizeDataUrl(data, 400, (step1) => {
                resizeDataUrl(step1, 200, (step2) => {
                    results[idx] = step2;
                    remaining--;
                    if (remaining === 0) resolve(results);
                }, 0.5);
            }, 0.5);
        });
    });
}

const vehicleDetailWindows = new Set();
let detailWindowZ = 2600;

// render simple markdown-like tags **bold**, *italic*, __underline__
function renderDescription(text) {
    if (!text) return '';
    // escape HTML
    let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    // bold **...**
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // italic *...*
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // underline __...__
    html = html.replace(/__(.+?)__/g, '<u>$1</u>');
    return html;
}

function generateVehicleId() {
    return 'veh-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 9);
}

function ensureVehicleIds() {
    if (!faction || !faction.techTree) return;
    let changed = false;
    for (let tier = 1; tier <= 12; tier++) {
        const arr = faction.techTree[tier] || [];
        arr.forEach(v => {
            if (!v.id) {
                v.id = generateVehicleId();
                changed = true;
            }
            if (v.links && !Array.isArray(v.links)) {
                v.links = [];
                changed = true;
            }
        });
    }
    if (changed) saveFactions();
}

function getAllVehicles() {
    const all = [];
    if (!faction || !faction.techTree) return all;
    for (let tier = 1; tier <= 12; tier++) {
        const arr = faction.techTree[tier] || [];
        arr.forEach(v => {
            all.push({
                id: v.id,
                name: v.name,
                tier: tier,
                class: v.class,
                folderVehicleId: v.folderVehicleId || ""
            });
        });
    }
    return all;
}

function renderVehicleLinksList(excludeId = null) {
    const list = document.getElementById("vehicleLinksList");
    if (!list) return;
    list.innerHTML = "";

    const searchElem = document.getElementById("vehicleLinksSearch");
    const query = (searchElem ? searchElem.value : "").trim().toLowerCase();

    const vehicles = getAllVehicles()
        .filter(v => v.id && v.id !== excludeId)
        .filter(v => !v.folderVehicleId)
        .filter(v => {
            if (!query) return true;
            const label = `${toRoman(v.tier)} ${v.class} ${v.name}`.toLowerCase();
            return label.includes(query);
        })
        .sort((a, b) => (a.tier - b.tier) || a.name.localeCompare(b.name));

    const visibleIds = new Set(vehicles.map(v => v.id));
    modalLinkedIds = modalLinkedIds.filter(id => visibleIds.has(id));

    if (!vehicles.length) {
        const empty = document.createElement("div");
        empty.textContent = "No vehicles available to link.";
        empty.style.opacity = "0.75";
        empty.style.fontSize = "12px";
        list.appendChild(empty);
        updateLinksDropdownLabel();
        return;
    }

    vehicles.forEach(v => {
        const row = document.createElement("label");
        row.className = "vehicle-link-item";

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.value = v.id;
        cb.checked = modalLinkedIds.includes(v.id);
        cb.addEventListener("change", () => {
            if (cb.checked) {
                if (!modalLinkedIds.includes(v.id)) modalLinkedIds.push(v.id);
            } else {
                modalLinkedIds = modalLinkedIds.filter(id => id !== v.id);
            }
            updateLinksDropdownLabel();
        });

        const txt = document.createElement("span");
        txt.textContent = `${toRoman(v.tier)} • ${v.class} • ${v.name}`;

        row.appendChild(cb);
        row.appendChild(txt);
        list.appendChild(row);
    });

    updateLinksDropdownLabel();
}

function updateLinksDropdownLabel() {
    const btn = document.getElementById("linksDropdownToggle");
    if (!btn) return;
    const count = modalLinkedIds.length;
    btn.textContent = count > 0 ? `Select links (${count})` : "Select links (0)";
}

function updateLinksAvailabilityControls() {
    const linksSection = document.getElementById("vehicleLinksSection");
    const linksPanel = document.getElementById("linksDropdownPanel");
    if (!linksSection) return;

    const isFolderedChild = !!modalFolderVehicleId;
    linksSection.classList.toggle("links-disabled", isFolderedChild);

function removeIncomingLinksToVehicle(targetVehicleId) {
    if (!targetVehicleId || !faction || !faction.techTree) return;
    for (let tier = 1; tier <= 12; tier++) {
        const arr = faction.techTree[tier] || [];
        arr.forEach(v => {
            if (!v || !Array.isArray(v.links) || !v.links.length) return;
            v.links = v.links.filter(linkId => linkId !== targetVehicleId);
        });
    }
}

function getVehicleById(id) {
    if (!id || !faction || !faction.techTree) return null;
    for (let tier = 1; tier <= 12; tier++) {
        const arr = faction.techTree[tier] || [];
        for (let i = 0; i < arr.length; i++) {
            const v = arr[i];
            if (v && v.id === id) {
                return { vehicle: v, tier };
            }
        }
    }
    return null;
}

function getFolderVehicleCandidates(excludeId = null) {
    if (!faction || !faction.techTree) return [];
    const tierVal = parseInt(document.getElementById("vehicleTier")?.value || "", 10);
    const classVal = document.getElementById("vehicleClass")?.value || "";
    if (!Number.isInteger(tierVal) || !classVal) return [];

    return (faction.techTree[tierVal] || [])
        .filter(v => v && v.id && v.id !== excludeId)
        .filter(v => v.class === classVal)
        .filter(v => !v.folderVehicleId)
        .sort((a, b) => (a.name || "").localeCompare(b.name || ""));
}

function renderFolderVehicleList(excludeId = null) {
    const list = document.getElementById("folderVehicleList");
    if (!list) return;
    list.innerHTML = "";

    const searchElem = document.getElementById("folderVehicleSearch");
    const query = (searchElem ? searchElem.value : "").trim().toLowerCase();
    const candidates = getFolderVehicleCandidates(excludeId)
        .filter(v => {

function drawVehicleLinks(container, visibleVehicleElements, visibleVehiclesById) {
    const old = container.querySelector('.connector-overlay');
    if (old) old.remove();

    const containerRect = container.getBoundingClientRect();
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', 'connector-overlay');
    svg.setAttribute('width', String(containerRect.width));
    svg.setAttribute('height', String(containerRect.height));

    const drawn = new Set();

    visibleVehiclesById.forEach((vehicle, sourceId) => {
        if (!Array.isArray(vehicle.links) || !vehicle.links.length) return;
        const sourceElem = visibleVehicleElements.get(sourceId);
        if (!sourceElem) return;

        const sourceRect = sourceElem.getBoundingClientRect();
        const x1 = sourceRect.left + sourceRect.width / 2 - containerRect.left;
        const y1 = sourceRect.top + sourceRect.height / 2 - containerRect.top;

        vehicle.links.forEach(targetId => {
            const targetElem = visibleVehicleElements.get(targetId);
            if (!targetElem) return;

            const key = [sourceId, targetId].sort().join('|');
            if (drawn.has(key)) return;
            drawn.add(key);

            const targetRect = targetElem.getBoundingClientRect();
            const x2 = targetRect.left + targetRect.width / 2 - containerRect.left;
            const y2 = targetRect.top + targetRect.height / 2 - containerRect.top;

            if (viewMode === "barebones") {
                // Barebones mode uses orthogonal connectors only.
                const elbowX = (x1 + x2) / 2;
                const pathData = `M ${x1} ${y1} L ${elbowX} ${y1} L ${elbowX} ${y2} L ${x2} ${y2}`;

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.classList.add('connector-line');
                path.dataset.sourceId = sourceId;
                path.dataset.targetId = targetId;
                path.setAttribute('d', pathData);
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke', '#ffffff');
                path.setAttribute('stroke-width', '1');
                path.setAttribute('opacity', '0.9');
                svg.appendChild(path);
            } else {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.classList.add('connector-line');
                line.dataset.sourceId = sourceId;
                line.dataset.targetId = targetId;
                line.setAttribute('x1', String(x1));
                line.setAttribute('y1', String(y1));
                line.setAttribute('x2', String(x2));
                line.setAttribute('y2', String(y2));
                line.setAttribute('stroke', '#ffffff');
                line.setAttribute('stroke-width', '1');
                line.setAttribute('opacity', '0.9');
                svg.appendChild(line);
            }
        });
    });

    container.appendChild(svg);
}

async function updateStorageUsageIndicator() {
    const elem = document.getElementById("storageUsage");
    if (!elem) return;
    const info = await TechTreeStorage.getUsageInfo();
    const usedBytes = info.usedBytes || 0;
    const quotaBytes = info.quotaBytes || 0;
    const usedMb = usedBytes / (1024 * 1024);
    const quotaMb = quotaBytes > 0 ? quotaBytes / (1024 * 1024) : 0;
    const pct = quotaBytes > 0 ? Math.min(100, Math.round((usedBytes / quotaBytes) * 100)) : 0;
    if (quotaBytes > 0) {
        elem.textContent = `Storage: ${usedMb.toFixed(2)} MB / ${quotaMb.toFixed(0)} MB (${pct}%)`;
    } else {
        elem.textContent = `Storage: ${usedMb.toFixed(2)} MB`;
    }
}

function reorderVehiclesInClass(tier, className, fromIndex, toIndex) {
    const arr = faction && faction.techTree ? faction.techTree[tier] : null;
    if (!Array.isArray(arr)) return false;

    const classIndices = [];
    const classVehicles = [];
    arr.forEach((v, idx) => {
        if (v && v.class === className) {
            classIndices.push(idx);
            classVehicles.push(v);
        }
    });

    const fromPos = classIndices.indexOf(fromIndex);
    const toPos = classIndices.indexOf(toIndex);
    if (fromPos === -1 || toPos === -1 || fromPos === toPos) return false;

    const moved = classVehicles.splice(fromPos, 1)[0];
    classVehicles.splice(toPos, 0, moved);

    classIndices.forEach((arrIndex, pos) => {
        arr[arrIndex] = classVehicles[pos];
    });

    return true;
}

function clamp(val, min, max) {
    return Math.max(min, Math.min(max, val));
}

function makeDetailWindowDraggable(win, handle, ignoreElem) {
    let isDragging = false;
    let offsetX = 0;
    let offsetY = 0;

    const onMove = (e) => {
        if (!isDragging) return;
        const maxLeft = window.innerWidth - win.offsetWidth;
        const maxTop = window.innerHeight - win.offsetHeight;
        win.style.left = clamp(e.clientX - offsetX, 0, Math.max(0, maxLeft)) + 'px';
        win.style.top = clamp(e.clientY - offsetY, 0, Math.max(0, maxTop)) + 'px';
    };

    const onUp = () => {
        isDragging = false;
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
    };

    handle.addEventListener('mousedown', (e) => {
        if (ignoreElem && (ignoreElem === e.target || ignoreElem.contains(e.target))) return;
        isDragging = true;
        focusDetailWindow(win);
        const rect = win.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
    });
}

function makeDetailWindowResizable(win, resizeHandle) {
    let isResizing = false;
    let startX = 0;
    let startY = 0;
    let startW = 0;
    let startH = 0;
    const minW = 280;
    const minH = 220;

    const onMove = (e) => {
        if (!isResizing) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        const nextW = clamp(startW + dx, minW, window.innerWidth - win.offsetLeft - 6);
        const nextH = clamp(startH + dy, minH, window.innerHeight - win.offsetTop - 6);
        win.style.width = nextW + 'px';
        win.style.height = nextH + 'px';
    };

    const onUp = () => {
        isResizing = false;
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
    };

    resizeHandle.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        isResizing = true;
        focusDetailWindow(win);
        startX = e.clientX;
        startY = e.clientY;
        startW = win.offsetWidth;
        startH = win.offsetHeight;
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
    });
}

function openVehicleDetailWindow(vehicle, tier, role, sourceElem) {
    const panel = document.createElement('div');
    panel.className = 'vehicle-detail-window';

    const header = document.createElement('div');
    header.className = 'vehicle-detail-header';

    const title = document.createElement('div');
    title.className = 'vehicle-detail-title';
    title.textContent = `${toRoman(tier)} - ${role}`;

    const headerRight = document.createElement('div');
    headerRight.className = 'vehicle-detail-header-right';

    const detailFlagSrc = (vehicle.foreignVehicle && vehicle.foreignFlag)
        ? getVehicleFlagSrc(vehicle.foreignFlag)
        : "";
    if (detailFlagSrc) {
        const detailFlag = document.createElement('img');
        detailFlag.className = 'vehicle-detail-flag';
        detailFlag.src = detailFlagSrc;
        detailFlag.alt = 'foreign flag';
        headerRight.appendChild(detailFlag);
    }

    const closeBtn = document.createElement('button');
    closeBtn.type = 'button';
    closeBtn.className = 'vehicle-detail-close';
    closeBtn.textContent = '✕';
    closeBtn.onclick = () => closeVehicleDetailWindow(panel);
    headerRight.appendChild(closeBtn);

    header.appendChild(title);
    header.appendChild(headerRight);

    const body = document.createElement('div');
    body.className = 'vehicle-detail-body';

    const name = document.createElement('div');
    name.className = 'vehicle-detail-name';
    name.textContent = vehicle.name || '';
    body.appendChild(name);

    let imgs = [];
    if (vehicle.images && vehicle.images.length) imgs = vehicle.images.slice();
    else if (vehicle.image) imgs = [vehicle.image];

    if (imgs.length) {
        const previewWrap = document.createElement('div');
        previewWrap.className = 'vehicle-detail-preview-wrap';

        const mainImg = document.createElement('img');
        mainImg.className = 'vehicle-detail-main-image';
        const selectedSrc = imgs[vehicle.preview || 0] || imgs[0];
        mainImg.src = selectedSrc;

        const hoverImg = document.createElement('img');
        hoverImg.className = 'vehicle-detail-hover-image hidden';

        previewWrap.appendChild(mainImg);
        previewWrap.appendChild(hoverImg);
        body.appendChild(previewWrap);

        if (imgs.length > 1) {
            const album = document.createElement('div');
            album.className = 'vehicle-detail-album';
            imgs.forEach(src => {
                const thumb = document.createElement('img');
                thumb.className = 'vehicle-detail-thumb';
                thumb.src = src;
                thumb.addEventListener('mouseenter', () => {
                    hoverImg.src = src;
                    hoverImg.classList.remove('hidden');
                });
                thumb.addEventListener('mouseleave', () => {
                    hoverImg.classList.add('hidden');
                });
                album.appendChild(thumb);
            });
            body.appendChild(album);
        }
    }

    if (vehicle.description) {
        const desc = document.createElement('div');
        desc.className = 'vehicle-detail-desc';
        desc.innerHTML = renderDescription(vehicle.description);
        body.appendChild(desc);
    }

    const stats = document.createElement('div');
    stats.className = 'vehicle-detail-stats';
    const addStatRow = (label, value) => {
        const row = document.createElement('div');
        row.className = 'vehicle-detail-stat-row';

        const key = document.createElement('span');
        key.className = 'vehicle-detail-stat-label';
        key.textContent = label + ':';

        const val = document.createElement('span');
        val.className = 'vehicle-detail-stat-value';
        val.textContent = value;

        row.appendChild(key);
        row.appendChild(val);
        stats.appendChild(row);
    };
    if (vehicle.hull) {
        addStatRow('Hull', vehicle.hull);
    }
    if (vehicle.turret) {
        addStatRow('Turret', vehicle.turret);
    }
    if (vehicle.gun) {
        addStatRow('Gun', vehicle.gun);
    }
    if (stats.children.length) body.appendChild(stats);

    panel.appendChild(header);
    panel.appendChild(body);

    const resizeHandle = document.createElement('div');
    resizeHandle.className = 'vehicle-detail-resize';
    panel.appendChild(resizeHandle);

    document.body.appendChild(panel);
    vehicleDetailWindows.add(panel);
    focusDetailWindow(panel);

    const srcRect = sourceElem.getBoundingClientRect();
    const panelRect = panel.getBoundingClientRect();
    const left = clamp(srcRect.right + 10, 6, window.innerWidth - panelRect.width - 6);
    const top = clamp(srcRect.top, 6, window.innerHeight - panelRect.height - 6);
    panel.style.left = left + 'px';
    panel.style.top = top + 'px';

    makeDetailWindowDraggable(panel, header, closeBtn);
    makeDetailWindowResizable(panel, resizeHandle);
    panel.addEventListener('mousedown', () => focusDetailWindow(panel));
}

function moveRole(index, delta) {
    const newIndex = index + delta;
    if (newIndex < 0 || newIndex >= faction.roles.length) return;
    const tmp = faction.roles[index];
    faction.roles[index] = faction.roles[newIndex];
    faction.roles[newIndex] = tmp;
    saveFactions();
    renderTechTree();
}

// text formatting helper for description
function wrapSelection(textarea, before, after) {
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    const val = textarea.value;
    textarea.value = val.slice(0, start) + before + val.slice(start, end) + after + val.slice(end);
    textarea.selectionStart = start + before.length;
    textarea.selectionEnd = end + before.length;
    textarea.focus();
}

async function initializeTechTreePage() {
    factions = await TechTreeStorage.getFactions();
    currentId = await TechTreeStorage.getCurrentFaction();
    warnIfIndexedDbUnavailable();
    faction = factions.find(f => f.id === currentId);

    if (faction && (!faction.roles || !Array.isArray(faction.roles) || faction.roles.length === 0)) {
        const defaults = ["Heavy Tank","Medium Tank","Light Tank","Tank Destroyer","MBT","SPAA"];
        faction.roles = defaults.map(n => ({ name: n, hidden: false, color: '#ffffff' }));
        saveFactions();
    }

    if (faction) {
        ensureVehicleIds();
    }

    if (!faction) {
        document.body.innerHTML = "<h1>Faction Not Found</h1><a href='index.html'>Back</a>";
    } else {
        setFactionTitle();
        updateStorageUsageIndicator();

        if (!faction.techTree || Object.keys(faction.techTree).length === 0) {
            faction.techTree = {};
            for (let i = 1; i <= 12; i++) {
                faction.techTree[i] = [];
            }
            saveFactions();
        }

        renderTechTree();
    }
}

function renderTechTree() {
    const container = document.getElementById("techTree");
    const previousPositions = new Map();
    container.querySelectorAll('.tank-box[data-vehicle-id]').forEach(card => {
        previousPositions.set(card.dataset.vehicleId, card.getBoundingClientRect());
    });
    container.innerHTML = "";
    const visibleVehicleElements = new Map();
    const visibleVehiclesById = new Map();

    // Top-left empty cell
    const emptyCorner = document.createElement("div");
    emptyCorner.className = "grid-corner";
    container.appendChild(emptyCorner);

    // helper to convert numbers to roman numerals
    function toRoman(num) {
        // support 1 through 12
        const romanNumerals = ["","I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"];
        return romanNumerals[num] || num;
    }

    // Tier headers now use roman numerals and are horizontal
    for (let tier = 1; tier <= 12; tier++) {
        const tierHeader = document.createElement("div");
        tierHeader.className = "tier-header";
        tierHeader.textContent = toRoman(tier);
        container.appendChild(tierHeader);
    }

    // Rows for each vehicle role defined on faction
    faction.roles.forEach((roleObj, roleIndex) => {
        const role = roleObj.name;
        if (roleObj.hidden && !editMode) return;

        const roleLabel = document.createElement("div");
        roleLabel.className = "role-label " + role.replace(/\s/g, "-");
        roleLabel.appendChild(document.createTextNode(role));
        if (roleObj.color && roleObj.color.toLowerCase() !== '#ffffff') {
            roleLabel.style.background = gradientFromColor(roleObj.color);
            roleLabel.style.color = '#fff';
        }
        if (roleObj.hidden && editMode) {
            roleLabel.style.opacity = "0.35";
        }
        // edit-mode controls for role
        if (editMode) {
            roleLabel.style.position = "relative";
            // make draggable for reordering
            roleLabel.draggable = true;
            roleLabel.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', roleIndex);
                e.dataTransfer.effectAllowed = 'move';
            });
            roleLabel.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            });
            roleLabel.addEventListener('drop', (e) => {
                e.preventDefault();
                const from = parseInt(e.dataTransfer.getData('text/plain'), 10);
                const to = roleIndex;
                if (from !== to) {
                    const item = faction.roles.splice(from, 1)[0];
                    faction.roles.splice(to, 0, item);
                    saveFactions();
                    renderTechTree();
                }
            });
            // hide/remove button (similar to vehicles)
            const removeBtn = document.createElement("div");
            removeBtn.className = "role-btn hide-role-btn";
            removeBtn.textContent = "|";
            removeBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                roleObj.hidden = !roleObj.hidden;
                saveFactions();
                renderTechTree();
            });
            roleLabel.appendChild(removeBtn);

            // small edit button to modify class properties
            const editRoleBtn = document.createElement("div");
            editRoleBtn.className = "role-btn edit-role-btn";
            editRoleBtn.textContent = "✏";
            editRoleBtn.draggable = false;
            editRoleBtn.addEventListener('mousedown', e => e.stopPropagation());
            editRoleBtn.onclick = (e) => {
                e.stopPropagation();
                openClassModal(roleIndex);
            };
            roleLabel.appendChild(editRoleBtn);
        }

        container.appendChild(roleLabel);

        for (let tier = 1; tier <= 12; tier++) {

            const cell = document.createElement("div");
            cell.className = "tier-cell";
            cell.style.background = ""; // remove any inherited gradient

            const vehiclesInCell = faction.techTree[tier]
                .map((v, i) => ({ ...v, index: i }))
                .filter(v => v.class === role);

            const vehiclesById = new Map();
            vehiclesInCell.forEach(v => {
                if (v && v.id) vehiclesById.set(v.id, v);
            });

            const childrenByParent = new Map();
            vehiclesInCell.forEach(v => {
                if (!v.folderVehicleId) return;
                if (!childrenByParent.has(v.folderVehicleId)) {
                    childrenByParent.set(v.folderVehicleId, []);
                }
                childrenByParent.get(v.folderVehicleId).push(v);
            });

            const parentVehicles = vehiclesInCell.filter(v => !v.folderVehicleId || !vehiclesById.has(v.folderVehicleId));

            const renderVehicleCard = (vehicle, isFolderChild = false) => {
                if (vehicle.hidden && !editMode) return null;

                const tank = document.createElement("div");
                tank.className = "tank-box";
                if (isFolderChild) {
                    tank.classList.add("folder-child");
                    if (folderExpandAnimParentId && vehicle.folderVehicleId === folderExpandAnimParentId) {
                        tank.classList.add("folder-enter");
                    }
                }
                tank.style.borderColor = getRoleBorderColor(roleObj, role);

                const vehicleId = vehicle.id;
                if (vehicleId) {
                    tank.dataset.vehicleId = vehicleId;
                    visibleVehicleElements.set(vehicleId, tank);
                    visibleVehiclesById.set(vehicleId, vehicle);
                }

                let imgUrl = "";
                if (vehicle.images && vehicle.images.length) {
                    imgUrl = vehicle.images[vehicle.preview || 0] || "";
                } else {
                    imgUrl = vehicle.image || "";
                }
                tank.style.backgroundImage = `url(${imgUrl})`;

                if (vehicle.hidden && editMode) {
                    tank.style.opacity = "0.35";
                }

                const nameTag = document.createElement("div");
                nameTag.className = "tank-name";
                const flagSrc = (vehicle.foreignVehicle && vehicle.foreignFlag)
                    ? getVehicleFlagSrc(vehicle.foreignFlag)
                    : "";
                if (flagSrc) {
                    const flagImg = document.createElement("img");
                    flagImg.className = "tank-foreign-flag";
                    flagImg.src = flagSrc;
                    flagImg.alt = "foreign flag";
                    nameTag.appendChild(flagImg);
                }
                const nameText = document.createElement("span");
                nameText.className = "tank-name-text";
                nameText.textContent = vehicle.name;
                nameTag.appendChild(nameText);
                tank.appendChild(nameTag);

                tank.addEventListener('mouseenter', () => {
                    if (vehicle.id) {
                        setHoveredVehicleLinks(vehicle.id);
                        setHoveredVehicleCards(vehicle.id);
                    }
                });
                tank.addEventListener('mouseleave', () => {
                    setHoveredVehicleLinks(null);
                    setHoveredVehicleCards(null);
                });

                tank.addEventListener('click', (e) => {
                    if (editMode) return;
                    e.stopPropagation();
                    openVehicleDetailWindow(vehicle, tier, role, tank);
                });

                if (editMode) {
                    tank.draggable = true;
                    tank.addEventListener('dragstart', (e) => {
                        draggedVehicleMeta = { tier, className: role, index: vehicle.index };
                        e.dataTransfer.effectAllowed = 'move';
                    });

                    tank.addEventListener('dragover', (e) => {
                        if (!draggedVehicleMeta) return;
                        if (draggedVehicleMeta.tier !== tier || draggedVehicleMeta.className !== role) return;
                        e.preventDefault();
                        e.dataTransfer.dropEffect = 'move';
                    });

                    tank.addEventListener('drop', (e) => {
                        e.preventDefault();
                        if (!draggedVehicleMeta) return;
                        if (draggedVehicleMeta.tier !== tier || draggedVehicleMeta.className !== role) return;
                        const changed = reorderVehiclesInClass(tier, role, draggedVehicleMeta.index, vehicle.index);
                        draggedVehicleMeta = null;
                        if (!changed) return;
                        saveFactions();
                        renderTechTree();
                    });

                    tank.addEventListener('dragend', () => {
                        draggedVehicleMeta = null;
                    });

                    const removeBtn = document.createElement("div");
                    removeBtn.className = "remove-btn";
                    removeBtn.textContent = "-";
                    removeBtn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        faction.techTree[tier][vehicle.index].hidden = !faction.techTree[tier][vehicle.index].hidden;
                        saveFactions();
                        renderTechTree();
                    });
                    tank.appendChild(removeBtn);

                    const editBtn = document.createElement("div");
                    editBtn.className = "edit-vehicle-btn";
                    editBtn.textContent = "✏";
                    editBtn.onclick = (e) => {
                        e.stopPropagation();
                        editingVehicle = vehicle;
                        editingTier = tier;
                        editingIndex = vehicle.index;
                        document.getElementById("vehicleName").value = vehicle.name;
                        document.getElementById("vehicleClass").value = vehicle.class;
                        document.getElementById("modalTitle").textContent = "Edit Vehicle";
                        openModal(tier);
                    };
                    tank.appendChild(editBtn);
                }

                const childCount = (childrenByParent.get(vehicle.id) || []).filter(v => !v.hidden || editMode).length;
                if (childCount > 0) {
                    const folderToggle = document.createElement("div");
                    const expanded = expandedFolderParents.has(vehicle.id);
                    folderToggle.className = "folder-toggle-btn";
                    folderToggle.textContent = expanded ? "-" : "+";
                    folderToggle.title = expanded ? "Collapse foldered vehicles" : "Expand foldered vehicles";
                    folderToggle.addEventListener("click", (e) => {
                        e.stopPropagation();
                        if (expandedFolderParents.has(vehicle.id)) {
                            expandedFolderParents.delete(vehicle.id);
                            folderExpandAnimParentId = null;
                        } else {
                            expandedFolderParents.add(vehicle.id);
                            folderExpandAnimParentId = vehicle.id;
                        }
                        renderTechTree();
                    });
                    tank.appendChild(folderToggle);
                }

                return tank;
            };

            parentVehicles.forEach(parentVehicle => {
                const parentCard = renderVehicleCard(parentVehicle, false);
                if (!parentCard) return;

                cell.appendChild(parentCard);

                const childVehicles = childrenByParent.get(parentVehicle.id) || [];
                if (!expandedFolderParents.has(parentVehicle.id)) return;
                const childrenGroup = document.createElement("div");
                childrenGroup.className = "folder-children-group";
                childVehicles.forEach(childVehicle => {
                    const childCard = renderVehicleCard(childVehicle, true);
                    if (childCard) {
                        childrenGroup.appendChild(childCard);
                    }
                });
                if (childrenGroup.children.length) {
                    cell.appendChild(childrenGroup);
                }
            });

            // Add button
            if (editMode) {
                const addBtn = document.createElement("div");
                addBtn.className = "add-btn";
                addBtn.textContent = "+";
                addBtn.onclick = () => openModal(tier);
                cell.appendChild(addBtn);
            }

            container.appendChild(cell);
        }
    });

    drawVehicleLinks(container, visibleVehicleElements, visibleVehiclesById);

    visibleVehicleElements.forEach((elem, id) => {
        const prev = previousPositions.get(id);
        if (!prev) return;
        const next = elem.getBoundingClientRect();
        const dx = prev.left - next.left;
        const dy = prev.top - next.top;
        if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
        elem.animate(
            [
                { transform: `translate(${dx}px, ${dy}px)` },
                { transform: 'translate(0px, 0px)' }
            ],
            {
                duration: 260,
                easing: 'ease-out'
            }
        );
    });

    folderExpandAnimParentId = null;
}

function downloadJsonFile(data, fileName) {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
}

function safeFileName(name) {
    return (name || 'tech-tree').replace(/[^a-z0-9_-]+/gi, '-').replace(/-+/g, '-').toLowerCase();
}

function normalizeImportedPayload(parsed) {
    if (!parsed || typeof parsed !== 'object') return null;
    if (parsed.techTree && typeof parsed.techTree === 'object') {
        return {
            roles: Array.isArray(parsed.roles) ? parsed.roles : null,
            techTree: parsed.techTree
        };
    }
    return null;
}

function toggleSaveState() {

    if (!btn) return;

        return;
    }
    if (modalImages.length > 1 && (modalPreviewIndex === null || modalPreviewIndex === undefined)) {

    selectedTier = tier;

    updateClassSelect(editingVehicle ? editingVehicle.class : null);
    document.getElementById("vehicleModal").classList.remove("hidden");
    const linksPanel = document.getElementById("linksDropdownPanel");

    // prepare state for edit or new
    if (editingVehicle) {
        document.getElementById("vehicleName").value = editingVehicle.name || "";
        document.getElementById("vehicleClass").value = editingVehicle.class || vehicleRoles[0];
        document.getElementById("vehicleTier").value = String(editingTier || tier || 1);

        document.getElementById("vehicleHull").value = editingVehicle.hull || "";
        document.getElementById("vehicleTurret").value = editingVehicle.turret || "";
        document.getElementById("vehicleGun").value = editingVehicle.gun || "";

        modalForeignVehicle = !!editingVehicle.foreignVehicle;
        modalForeignFlag = normalizeVehicleFlagValue(editingVehicle.foreignFlag || "");
        modalFolderVehicleId = editingVehicle.folderVehicleId || "";
        // load images from existing vehicle
        if (editingVehicle.images && editingVehicle.images.length) {
            modalImages = editingVehicle.images.slice();
            modalPreviewIndex = editingVehicle.preview || 0;
        } else if (editingVehicle.image) {
            modalImages = [editingVehicle.image];
            modalPreviewIndex = 0;
        } else {
            modalImages = [];
            modalPreviewIndex = null;
        }
        const removeVehicleBtn = document.getElementById("removeVehicle");
        if (removeVehicleBtn) removeVehicleBtn.style.display = "block";

        document.getElementById("vehicleTier").value = String(tier || 1);
        modalImages = [];
        document.getElementById("vehicleHull").value = "";
        document.getElementById("vehicleTurret").value = "";
        document.getElementById("vehicleGun").value = "";
        modalLinkedIds = [];
        modalForeignVehicle = false;

const removeVehicleBtn = document.getElementById("removeVehicle");
if (removeVehicleBtn) {
    let holdDeleteVehicleTimer = null;
    let holdDeleteVehicleInterval = null;

    function deleteEditingVehicle() {
        if (editingTier === null || editingIndex === null) return;
        if (!Array.isArray(faction.techTree[editingTier])) return;
        faction.techTree[editingTier].splice(editingIndex, 1);
        saveFactions();
        renderTechTree();
        resetModal();
    }

    function resetHoldDeleteVehicleVisual() {
        const progress = document.getElementById("holdDeleteVehicleProgress");
        if (progress) progress.style.width = "0%";
    }

    function stopHoldDeleteVehicle() {
        if (holdDeleteVehicleTimer) {
            clearTimeout(holdDeleteVehicleTimer);
            holdDeleteVehicleTimer = null;
        }
        if (holdDeleteVehicleInterval) {
            clearInterval(holdDeleteVehicleInterval);
            holdDeleteVehicleInterval = null;
        }
        resetHoldDeleteVehicleVisual();
    }

    function startHoldDeleteVehicle() {
        if (editingTier === null || editingIndex === null) return;
        stopHoldDeleteVehicle();
        const duration = 4000;
        const start = Date.now();
        const progress = document.getElementById("holdDeleteVehicleProgress");

        holdDeleteVehicleInterval = setInterval(() => {
            const elapsed = Date.now() - start;
            const pct = Math.max(0, Math.min(100, (elapsed / duration) * 100));
            if (progress) progress.style.width = pct + "%";
        }, 40);

        holdDeleteVehicleTimer = setTimeout(() => {
            stopHoldDeleteVehicle();
            deleteEditingVehicle();
        }, duration);
    }

    removeVehicleBtn.addEventListener("mousedown", startHoldDeleteVehicle);
    removeVehicleBtn.addEventListener("mouseup", stopHoldDeleteVehicle);
    removeVehicleBtn.addEventListener("mouseleave", stopHoldDeleteVehicle);
    removeVehicleBtn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        startHoldDeleteVehicle();
    }, { passive: false });
    removeVehicleBtn.addEventListener("touchend", stopHoldDeleteVehicle);
    removeVehicleBtn.addEventListener("touchcancel", stopHoldDeleteVehicle);
}

// open class modal when add button clicked
let editingClassIndex = null;
function resetClassModal() {
    document.getElementById("classModal").classList.add("hidden");
    document.getElementById("className").value = "";
    document.getElementById("classColor").value = "#ffffff";
    document.getElementById("colorPreview").style.background = gradientFromColor('#ffffff');
    const removeBtn = document.getElementById("removeClass");
    if (removeBtn) removeBtn.style.display = "none";
    const removeProgress = document.getElementById("holdDeleteClassProgress");
    if (removeProgress) removeProgress.style.width = "0%";
    editingClassIndex = null;
}

function openClassModal(editIdx = null) {
    editingClassIndex = editIdx;
    const removeBtn = document.getElementById("removeClass");
    if (editIdx !== null) {
        const obj = faction.roles[editIdx];
        document.getElementById("className").value = obj.name;
        document.getElementById("classColor").value = obj.color || '#ffffff';
        document.getElementById("colorPreview").style.background = gradientFromColor(obj.color || '#ffffff');
        document.getElementById("classModalTitle").textContent = "Edit Class";
        if (removeBtn) removeBtn.style.display = "block";
    } else {
        document.getElementById("classModalTitle").textContent = "New Class";
        if (removeBtn) removeBtn.style.display = "none";
    }
    document.getElementById("classModal").classList.remove("hidden");
}

document.getElementById("addClassBtn").onclick = () => {
    openClassModal();
};

document.getElementById("classColor").addEventListener('input', (e) => {
    const col = e.target.value;
    document.getElementById("colorPreview").style.background = gradientFromColor(col);
});

document.getElementById("cancelClass").onclick = resetClassModal;

document.getElementById("saveClass").onclick = () => {
    const name = document.getElementById("className").value.trim();
    const color = document.getElementById("classColor").value;
    if (!name) return;
    const entry = { name, hidden: false, color };
    if (editingClassIndex !== null) {
        const previousName = faction.roles[editingClassIndex]?.name;
        faction.roles[editingClassIndex] = entry;
        if (previousName && previousName !== name) {
            for (let tier = 1; tier <= 12; tier++) {
                const vehicles = faction.techTree[tier] || [];
                vehicles.forEach(vehicle => {
                    if (vehicle.class === previousName) {
                        vehicle.class = name;
                    }
                });
            }
        }
    } else {
        faction.roles.push(entry);
    }
    saveFactions();
    renderTechTree();
    resetClassModal();
};

const removeClassBtn = document.getElementById("removeClass");
if (removeClassBtn) {
    let holdDeleteClassTimer = null;
    let holdDeleteClassInterval = null;

    function deleteEditingClass() {
        if (editingClassIndex === null) return;
        faction.roles.splice(editingClassIndex, 1);
        saveFactions();
        renderTechTree();
        resetClassModal();
    }

    function resetHoldDeleteClassVisual() {
        const progress = document.getElementById("holdDeleteClassProgress");
        if (progress) progress.style.width = "0%";
    }

    function stopHoldDeleteClass() {
        if (holdDeleteClassTimer) {
            clearTimeout(holdDeleteClassTimer);
            holdDeleteClassTimer = null;
        }
        if (holdDeleteClassInterval) {
            clearInterval(holdDeleteClassInterval);
            holdDeleteClassInterval = null;
        }
        resetHoldDeleteClassVisual();
    }

    function startHoldDeleteClass() {
        if (editingClassIndex === null) return;
        stopHoldDeleteClass();
        const duration = 4000;
        const start = Date.now();
        const progress = document.getElementById("holdDeleteClassProgress");

        holdDeleteClassInterval = setInterval(() => {
            const elapsed = Date.now() - start;
            const pct = Math.max(0, Math.min(100, (elapsed / duration) * 100));
            if (progress) progress.style.width = pct + "%";
        }, 40);

        holdDeleteClassTimer = setTimeout(() => {
            stopHoldDeleteClass();
            deleteEditingClass();
        }, duration);
    }

    removeClassBtn.addEventListener("mousedown", startHoldDeleteClass);
    removeClassBtn.addEventListener("mouseup", stopHoldDeleteClass);
    removeClassBtn.addEventListener("mouseleave", stopHoldDeleteClass);
    removeClassBtn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        startHoldDeleteClass();
    }, { passive: false });
    removeClassBtn.addEventListener("touchend", stopHoldDeleteClass);
    removeClassBtn.addEventListener("touchcancel", stopHoldDeleteClass);
}

const imageInputElem = document.getElementById("vehicleImages");
if (imageInputElem) {
    imageInputElem.addEventListener("change", (e) => {
        modalImages = [];
        modalPreviewIndex = null;
        const files = Array.from(e.target.files).slice(0, 5);
        expectedImageCount = files.length;
        pendingImageReads = files.length;
        if (files.length === 1) {
            modalPreviewIndex = 0;
        }
        toggleSaveState();
        if (files.length === 0) {
            updateImagePreviews();
            return;
        }
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (evt) => {
                const rawData = evt.target.result;
                // immediately use raw data for quick thumbnail
                modalImages.push(rawData);
                pendingImageReads--;
                updateImagePreviews();
                if (pendingImageReads === 0) {
                    toggleSaveState();
                }
                // asynchronously resize in background, replace value when done
                resizeDataUrl(rawData, 800, (resized) => {
                    const idx = modalImages.indexOf(rawData);
                    if (idx !== -1) {
                        modalImages[idx] = resized;
                        // if the replaced image was selected preview, nothing changes
                    }
                });
            };
            reader.readAsDataURL(file);
        });
    });
}

// helper performing the actual data mutation and storage
function performSave(data, targetTier) {
    const tierNum = Number(targetTier);
    const safeTier = Number.isInteger(tierNum) && tierNum >= 1 && tierNum <= 12 ? tierNum : (editingTier || selectedTier || 1);

    if (editingVehicle !== null) {
        const vehicleRef = faction.techTree[editingTier][editingIndex];
        if (!vehicleRef.id) {
            vehicleRef.id = generateVehicleId();
        }
        vehicleRef.name = data.name;
        vehicleRef.class = data.class;
        vehicleRef.description = data.description;
        vehicleRef.links = Array.isArray(data.links) ? data.links : [];
        vehicleRef.foreignVehicle = !!data.foreignVehicle;
        vehicleRef.foreignFlag = data.foreignFlag || "";
        vehicleRef.folderVehicleId = data.folderVehicleId || "";
        if (vehicleRef.folderVehicleId) {
            vehicleRef.links = [];
            removeIncomingLinksToVehicle(vehicleRef.id);
        }
        if ('hull' in data) vehicleRef.hull = data.hull;
        if ('turret' in data) vehicleRef.turret = data.turret;
        if ('gun' in data) vehicleRef.gun = data.gun;
        if (data.images) {
            vehicleRef.images = data.images;
            vehicleRef.preview = data.preview;
            delete vehicleRef.image;
        }

        if (safeTier !== editingTier) {
            faction.techTree[editingTier].splice(editingIndex, 1);
            faction.techTree[safeTier].push(vehicleRef);
        }
    } else {
        faction.techTree[safeTier].push(data);
        if (data.folderVehicleId) {
            removeIncomingLinksToVehicle(data.id);
        }
    }
    saveFactions();
    renderTechTree();
}

// make handler async to allow awaiting compression retry
document.getElementById("createVehicle").onclick = async () => {
    try {
        const name = document.getElementById("vehicleName").value.trim();
        const vehicleClass = document.getElementById("vehicleClass").value;
        const chosenTier = parseInt(document.getElementById("vehicleTier").value, 10);

        if (!name) return;

        if (modalImages.length > 1 && (modalPreviewIndex === null || modalPreviewIndex === undefined)) {
            alert("Please select a preview image before saving.");
            return;
        }

        const newData = { name: name, class: vehicleClass, description: document.getElementById("vehicleDesc").value.trim() };
        if (editingVehicle && editingVehicle.id) {
            newData.id = editingVehicle.id;
        } else {
            newData.id = generateVehicleId();
        }
        newData.links = modalLinkedIds.slice();
        newData.foreignVehicle = !!(document.getElementById("vehicleForeignToggle") && document.getElementById("vehicleForeignToggle").checked);
        newData.foreignFlag = newData.foreignVehicle ? normalizeVehicleFlagValue(modalForeignFlag) : "";
        const folderCandidates = getFolderVehicleCandidates(editingVehicle ? editingVehicle.id : null);
        const folderCandidateIds = new Set(folderCandidates.map(v => v.id));
        newData.folderVehicleId = folderCandidateIds.has(modalFolderVehicleId) ? modalFolderVehicleId : "";
        if (newData.folderVehicleId) {
            newData.links = [];
        }
        const hullVal = document.getElementById("vehicleHull").value.trim();
        const turretVal = document.getElementById("vehicleTurret").value.trim();
        const gunVal = document.getElementById("vehicleGun").value.trim();
        if (hullVal) newData.hull = hullVal;
        if (turretVal) newData.turret = turretVal;
        if (gunVal) newData.gun = gunVal;
        if (modalImages.length) {
            newData.images = modalImages.slice();
            newData.preview = modalPreviewIndex || 0;
        }

        try {
            performSave(newData, chosenTier);
        } catch (err) {
            // if quota issue and we have images, try compressing further
            if ((err.name === 'QuotaExceededError' || err.message.includes('quota')) && newData.images && newData.images.length) {
                const smaller = await reduceImagesForQuota(newData.images);
                newData.images = smaller;
                // try again once
                performSave(newData, chosenTier);
            } else {
                throw err;
            }
        }
    } catch (err) {
        console.error("Error saving vehicle:", err);
        if (err.name === 'QuotaExceededError' || err.message.includes('quota')) {
            alert("Storage quota exceeded. Try using fewer or smaller images.");
        } else {
            alert("Failed to save vehicle: " + (err.message || err));
        }
    } finally {
        resetModal();
    }
};

document.getElementById("editToggle").onclick = () => {
    editMode = !editMode;
    document.body.classList.toggle("edit-mode", editMode);
    playEditModeFlash();
    document.getElementById("editToggle").style.color = editMode ? "#4CAF50" : "#aaa";
    document.getElementById("addClassBtn").style.display = editMode ? "inline" : "none";
    if (editMode) closeAllVehicleDetailWindows();
    renderTechTree();
};

function playEditModeFlash() {
    document.body.classList.remove("edit-mode-flash");
    void document.body.offsetWidth;
    document.body.classList.add("edit-mode-flash");
    setTimeout(() => {
        document.body.classList.remove("edit-mode-flash");
    }, 1000);
}

function goBack() {
    window.location.href = "index.html";
}

document.getElementById("exportBtn").onclick = () => {
    if (!faction) return;

    const payload = {
        format: "tech-tree-composition-v1",
        exportedAt: new Date().toISOString(),
        roles: Array.isArray(faction.roles) ? faction.roles : [],
        techTree: faction.techTree || {}
    };
    downloadJsonFile(
        payload,
        `${safeFileName(faction.name)}-tech-tree-composition-${new Date().toISOString().slice(0, 10)}.json`
    );
};

document.getElementById("importBtn").onclick = () => {
    const input = document.getElementById("importJsonInput");
    if (!input) return;
    input.value = "";
    input.click();
};

document.getElementById("importJsonInput").addEventListener("change", (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => {
        try {
            const parsed = JSON.parse(reader.result);
            const normalized = normalizeImportedPayload(parsed);
            if (!normalized) {
                alert("Invalid JSON format. Expected a tech tree composition object with techTree.");
                return;
            }

            const confirmed = confirm("This will replace ONLY the current faction tech tree composition. Continue?");
            if (!confirmed) return;

            if (!faction) {
                alert("No active faction selected.");
                return;
            }

            if (normalized.roles) {
                faction.roles = normalized.roles;
            }
            faction.techTree = normalized.techTree;

            for (let i = 1; i <= 12; i++) {
                if (!Array.isArray(faction.techTree[i])) {
                    faction.techTree[i] = [];
                }
            }

            saveFactions();
            refreshAfterDataChange();
            alert("Import complete for current faction.");
        } catch (err) {
            alert("Failed to import JSON: " + (err.message || err));
        }
    };
    reader.readAsText(file);
});

window.addEventListener('resize', () => {
    if (faction) renderTechTree();
    closeAllVehicleDetailWindows();
});
</script>
